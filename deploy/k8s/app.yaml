apiVersion: apps/v1
kind: Deployment
metadata:
  name: agenthub-server
  namespace: agenthub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agenthub-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: agenthub-server
    spec:
      containers:
        - name: agenthub-server
          image: agenthub:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: CORS_ORIGINS
              value: "https://agenthub.agi.bar,http://localhost:3000,http://localhost:5173"
            - name: PUBLIC_BASE_URL
              value: "https://agenthub.agi.bar"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: agenthub-app
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: agenthub-app
                  key: JWT_SECRET
            - name: VAULT_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: agenthub-app
                  key: VAULT_MASTER_KEY
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: agenthub-app
                  key: GITHUB_CLIENT_ID
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: agenthub-app
                  key: GITHUB_CLIENT_SECRET
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: agenthub-server
  namespace: agenthub
spec:
  selector:
    app: agenthub-server
  ports:
    - port: 8080
      targetPort: 8080
