name: Release
on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o agenthub-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/server/
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o agenthub-mcp-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/mcp/
      - uses: actions/upload-artifact@v4
        with:
          name: agenthub-${{ matrix.goos }}-${{ matrix.goarch }}
          path: agenthub-*
