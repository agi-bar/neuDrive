name: CI
on:
  push:
    branches: [main, claude/*]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go vet ./...
      - run: |
          go install golang.org/x/tools/cmd/goimports@v0.43.0
          goimports -l . | (! grep .)

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agenthub
          POSTGRES_PASSWORD: test
          POSTGRES_DB: agenthub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go test -p 1 ./... -v -race -coverprofile=coverage.out
        env:
          DATABASE_URL: postgres://agenthub:test@localhost:5432/agenthub_test?sslmode=disable
          AGENTHUB_TEST_DB: postgres://agenthub:test@localhost:5432/agenthub_test?sslmode=disable
          JWT_SECRET: test-jwt-secret
          VAULT_MASTER_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go build -o agenthub ./cmd/server/
      - run: go build -o agenthub-mcp ./cmd/mcp/

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - run: cd web && npm ci && npm run build
      - run: cd web && npx tsc --noEmit

  sync-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agenthub
          POSTGRES_PASSWORD: test
          POSTGRES_DB: agenthub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: cd sdk/javascript && npm ci
      - run: cd web && npm ci
      - run: python -m pip install --upgrade pip
      - run: python -m pip install 'httpx>=0.25.0'
      - run: npx playwright install --with-deps chromium
        working-directory: web
      - run: go build -o /tmp/agenthub-server ./cmd/server
      - run: /tmp/agenthub-server > /tmp/agenthub-server.log 2>&1 &
        env:
          DATABASE_URL: postgres://agenthub:test@localhost:5432/agenthub_test?sslmode=disable
          JWT_SECRET: test-jwt-secret
          VAULT_MASTER_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          PORT: '8080'
      - run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/api/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/agenthub-server.log
          exit 1
      - run: python -m unittest tools/test_ahub_sync_diff.py sdk/python/tests/test_sync_integration.py tools/test_ahub_sync_integration.py
        env:
          AGENTHUB_TEST_URL: http://localhost:8080
      - run: npm test --prefix sdk/javascript
        env:
          AGENTHUB_TEST_URL: http://localhost:8080
      - run: npx playwright test web/e2e/sync.spec.ts
        working-directory: web
        env:
          AGENTHUB_TEST_URL: http://localhost:8080

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test, build, frontend, sync-integration]
    steps:
      - uses: actions/checkout@v6
      - run: docker build -t agenthub:test .
