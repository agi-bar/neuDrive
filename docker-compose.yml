services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-neudrive}
      POSTGRES_USER: ${POSTGRES_USER:-neudrive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neudrive_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-neudrive} -d ${POSTGRES_DB:-neudrive}"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: .
    command: ["./neudrive", "server", "--listen", ":8080"]
    ports:
      - "${PORT:-8080}:8080"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-neudrive}:${POSTGRES_PASSWORD:-neudrive_dev}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-neudrive}?sslmode=disable
      PORT: "${PORT:-8080}"
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      VAULT_MASTER_KEY: ${VAULT_MASTER_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
