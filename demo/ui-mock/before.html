<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>当前：数据文件 - 所有文件（示意）</title>
  <style>
    :root{--bg:#f8f9fa;--surface:#fff;--border:#e2e6ea;--muted:#6b7280;--text:#1a1a1a;--primary:#2563eb}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);font:14px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;color:var(--text)}
    .app{display:flex;min-height:100vh}
    .sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);padding:16px}
    .main{flex:1;padding:24px}
    .title{font-weight:600;font-size:18px;margin-bottom:6px}
    .sub{color:var(--muted);margin-bottom:16px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px}
    .row{display:flex;justify-content:space-between;margin-bottom:8px}
    .path{font-size:12px;color:#2563eb;word-break:break-all}
    .chips{display:flex;gap:8px}
    .chip{border:1px solid #eef0f2;border-radius:999px;padding:4px 8px;color:#475569;background:#f9fafb;font-size:12px}
    .preview{color:#111;opacity:.92}
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div style="font-weight:600">neuDrive</div>
      <div style="margin-top:12px;color:var(--muted)">数据文件 / 所有文件</div>
    </aside>
    <main class="main">
      <div class="title">所有文件</div>
      <div class="sub">按最近更新时间汇总的列表（当前实现示意）</div>

      <!-- 若干卡片，代表当前的“卡片流式列表”视觉 -->
      <div class="card">
        <div class="row">
          <div style="font-weight:600">context.md</div>
          <div class="chips">
            <div class="chip">项目</div>
            <div class="chip">project_context</div>
            <div class="chip">2026-04-07 10:23</div>
          </div>
        </div>
        <div class="path">/projects/demo/context.md</div>
        <div class="preview">这是项目上下文的预览摘要……</div>
      </div>

      <div class="card">
        <div class="row">
          <div style="font-weight:600">SKILL.md</div>
          <div class="chips">
            <div class="chip">技能</div>
            <div class="chip">skill</div>
            <div class="chip">2026-04-06 21:10</div>
          </div>
        </div>
        <div class="path">/skills/sample/SKILL.md</div>
        <div class="preview">这是技能文档的预览摘要……</div>
      </div>

      <div class="card">
        <div class="row">
          <div style="font-weight:600">note.md</div>
          <div class="chips">
            <div class="chip">根文件</div>
            <div class="chip">file</div>
            <div class="chip">2026-04-05 13:47</div>
          </div>
        </div>
        <div class="path">/notes/note.md</div>
        <div class="preview">这是一条普通 Markdown 文档的内容摘要……</div>
      </div>
    </main>
  </div>
</body>
</html>
