<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>重设计：文件管理器（对标 Dropbox）</title>
  <style>
    :root{--bg:#f8f9fa;--surface:#fff;--border:#e2e6ea;--muted:#6b7280;--text:#1a1a1a;--primary:#2563eb}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);font:14px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;color:var(--text)}
    .app{display:flex;min-height:100vh}
    .sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);padding:16px}
    .main{flex:1;padding:16px 24px}
    .toolbar{display:flex;align-items:center;gap:8px;margin-bottom:10px}
    .crumbs{font-size:12px;color:var(--muted)}
    .crumbs button{border:none;background:none;color:var(--primary);cursor:pointer}
    .search{margin-left:auto}
    .search input{padding:6px 10px;border:1px solid var(--border);border-radius:6px;width:280px}
    .btn{padding:7px 12px;border:1px solid var(--border);border-radius:6px;background:var(--surface);cursor:pointer}
    .btn-primary{background:var(--primary);border-color:var(--primary);color:#fff}
    .table{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
    .thead,.trow{display:grid;grid-template-columns: 1fr 120px 160px 180px;align-items:center}
    .thead{background:#fafbfc;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--muted)}
    .tcell{padding:10px 12px}
    .trow{border-top:1px solid #f1f2f4}
    .trow:hover{background:#f6f8ff}
    .name{display:flex;align-items:center;gap:8px}
    .badge{display:inline-block;border:1px solid #eef0f2;background:#f9fafb;color:#475569;border-radius:999px;padding:2px 8px;font-size:12px}
    .actions{visibility:hidden}
    .trow:hover .actions{visibility:visible}
    .preview{margin-top:12px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px}
    .meta{color:var(--muted);font-size:12px}
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div style="font-weight:600">Agent Hub</div>
      <div style="margin-top:12px;color:var(--muted)">文件管理器</div>
    </aside>
    <main class="main">
      <div class="toolbar">
        <div class="crumbs">
          <button>根目录</button> / <button>projects</button> / demo
        </div>
        <div class="search"><input placeholder="搜索（支持命名空间/类型 chips）" /></div>
        <button class="btn">新建文件夹</button>
        <button class="btn">新建文件</button>
        <button class="btn">上传文本</button>
        <button class="btn btn-primary">删除</button>
      </div>

      <div class="table">
        <div class="thead">
          <div class="tcell">名称</div>
          <div class="tcell">大小</div>
          <div class="tcell">命名空间</div>
          <div class="tcell">最近修改</div>
        </div>
        <div class="trow">
          <div class="tcell name">
            📁 demo
            <span class="actions"><button class="btn">重命名</button></span>
          </div>
          <div class="tcell">-</div>
          <div class="tcell"><span class="badge">projects</span></div>
          <div class="tcell">2026-04-07 10:23</div>
        </div>
        <div class="trow">
          <div class="tcell name">
            📝 context.md
            <span class="actions"><button class="btn">在编辑器打开</button></span>
          </div>
          <div class="tcell">2.1 KB</div>
          <div class="tcell"><span class="badge">projects</span></div>
          <div class="tcell">2026-04-07 10:23</div>
        </div>
        <div class="trow">
          <div class="tcell name">
            🧩 SKILL.md
            <span class="actions"><button class="btn">更多</button></span>
          </div>
          <div class="tcell">5.6 KB</div>
          <div class="tcell"><span class="badge">skills</span></div>
          <div class="tcell">2026-04-06 21:10</div>
        </div>
      </div>

      <div class="preview">
        <div class="card">
          <div style="font-weight:600;margin-bottom:6px">预览：context.md</div>
          <div class="meta">/projects/demo/context.md · 2.1 KB · 2026-04-07 10:23</div>
          <div style="margin-top:8px;line-height:1.65"># 项目上下文<br>说明与任务列表……（这里为 Markdown 预览区域）</div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
