version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agenthub
      POSTGRES_USER: agenthub
      POSTGRES_PASSWORD: agenthub_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenthub"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://agenthub:agenthub_dev@db:5432/agenthub?sslmode=disable
      PORT: "8080"
      JWT_SECRET: dev-jwt-secret-change-in-production
      VAULT_MASTER_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      GITHUB_CLIENT_ID: ""
      GITHUB_CLIENT_SECRET: ""
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
