name: Release
on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o neudrive-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/neudrive/
      - uses: actions/upload-artifact@v7
        with:
          name: neudrive-${{ matrix.goos }}-${{ matrix.goarch }}
          path: neudrive-*
